<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    .item-text.checked {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="newItem" type="text" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="summary" id="summary"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty">아직 아이템이 없어요. 위에서 추가해보세요!</div>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none;">
      완료된 항목 모두 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const summary = document.getElementById('summary');
      const clearBtn = document.getElementById('clearBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const checkedCount = items.filter(i => i.checked).length;
      summary.textContent = `총 ${items.length}개 · 완료 ${checkedCount}개`;
      clearBtn.style.display = checkedCount > 0 ? 'block' : 'none';

      items.forEach((item, index) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggleItem(index));

        const span = document.createElement('span');
        span.className = 'item-text' + (item.checked ? ' checked' : '');
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.title = '삭제';
        delBtn.addEventListener('click', () => deleteItem(index));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;

      items.push({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(index) {
      items[index].checked = !items[index].checked;
      save();
      render();
    }

    function deleteItem(index) {
      items.splice(index, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
